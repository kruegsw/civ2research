<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charlization</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="css/styles.css">
<link rel="icon" href="data:,">
</head>
<body>

<!-- Global hidden file input (shared by menu + controls bar) -->
<input type="file" id="sav-input" accept=".sav,.SAV,.net,.NET,.scn,.SCN"
       style="position:fixed;left:-9999px;opacity:0">

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Scene: Main Menu — Civ2 Startup Screen                         -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="menu-scene" class="scene">
  <div id="menu-layout">
    <!-- Map preview in gold picture frame (hidden for now) -->
    <!--
    <div id="menu-map-frame">
      <img id="menu-map-img" src="assets/menu/map-preview.gif" alt="Map Preview" draggable="false">
    </div>
    -->

    <!-- Medallion seal -->
    <img id="menu-seal" src="assets/menu/seal.gif" alt="Civilization II" draggable="false">

    <!-- Menu dialog (fades in on first click) -->
    <div id="menu-dialog">
      <div id="menu-frame">
        <div id="menu-titlebar"><span id="menu-title">Civilization II</span></div>
        <div id="menu-panel">
          <div id="menu-items">
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="new" disabled><span>Start a New Game</span></label>
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="premade" disabled><span>Start on Premade World</span></label>
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="customize" disabled><span>Customize World</span></label>
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="scenario" disabled><span>Begin Scenario</span></label>
            <label class="menu-radio"><input type="radio" name="menu-choice" value="load"><span>Load a Game</span></label>
            <label class="menu-radio"><input type="radio" name="menu-choice" value="multiplayer" checked><span>Multiplayer Game</span></label>
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="hall" disabled><span>View Hall of Fame</span></label>
            <label class="menu-radio disabled"><input type="radio" name="menu-choice" value="credits" disabled><span>View Credits</span></label>
          </div>
        </div>
        <div id="menu-btn-row">
          <button class="civ2-btn" id="menu-ok-btn">OK</button>
          <button class="civ2-btn" id="menu-cancel-btn" disabled>Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <div id="menu-footer">Based on Sid Meier's Civilization II</div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Scene: Lobby                                                   -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="lobby-scene" class="scene" style="display:none">
  <div id="lobby-header">
    <button class="lobby-nav-btn" id="lobby-back-btn">&larr; Menu</button>
    <h1 id="lobby-heading">Game Lobby</h1>
    <div id="lobby-right">
      <span id="ws-status" class="ws-off">
        <span class="ws-dot"></span>
        <span class="ws-label">Offline</span>
      </span>
      <label id="lobby-name-label">
        as <input id="lobby-name-input" placeholder="your name" maxlength="20" spellcheck="false">
      </label>
    </div>
  </div>

  <!-- Active game banner (shown when player has a started game) -->
  <div id="lobby-banner" style="display:none">
    <span id="lobby-banner-text"></span>
    <button id="lobby-banner-resume" class="lobby-nav-btn">Resume</button>
  </div>

  <!-- Room list view -->
  <div id="lobby-rooms-view">
    <div id="lobby-room-grid"></div>
  </div>

  <!-- Room detail view (hidden until joined) -->
  <div id="lobby-room-view" style="display:none">
    <div id="room-detail-header">
      <h2 id="room-name">Room</h2>
      <button class="lobby-nav-btn lobby-leave-btn" id="room-leave-btn">Leave Room</button>
    </div>
    <div id="room-seats"></div>
    <div id="room-actions">
      <div id="room-status-text"></div>
      <button id="room-ready-btn" class="civ2-btn room-ready-btn">Ready</button>
      <button id="room-back-btn" class="lobby-nav-btn" style="display:none">&larr; Rooms</button>
    </div>
  </div>

  <div id="lobby-status-bar">
    <span id="lobby-online-count"></span>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Scene: Game (existing viewer)                                  -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="game-scene" class="scene" style="display:none">
  <div id="controls">
    <button id="game-back-btn" class="ctrl-back-btn">&larr; Lobby</button>
    <label class="file-btn" id="sav-btn" for="sav-input">Load .SAV</label>
    <button id="render-btn" disabled>Render</button>
    <label class="ctl-option"><input type="checkbox" id="grid-toggle"> Grid</label>
    <label class="ctl-option"><input type="checkbox" id="minimap-toggle"> Minimap</label>
    <label class="ctl-option"><input type="checkbox" id="fow-toggle"> FoW</label>
    <label class="ctl-option"><input type="checkbox" id="los-toggle"> LOS</label>
    <select id="fow-civ" disabled>
      <option value="">— civ —</option>
    </select>
    <span id="restart-controls" style="display:none">
      <button id="restart-btn" class="civ2-btn" style="padding:2px 8px;font-size:12px">New Map</button>
    </span>
    <span id="status">Load a .SAV file to begin.</span>
    <span id="game-players"></span>
    <span id="game-info"></span>
  </div>

  <div id="map-container">
    <canvas id="map-canvas"></canvas>
    <canvas id="viewport-canvas"></canvas>
  </div>

  <!-- Turn UI (multiplayer) -->
  <div id="turn-ui" style="display:none">
    <div id="turn-info">
      <span id="turn-civ-name"></span>
      <span id="turn-number"></span>
    </div>
    <div id="research-info" style="cursor:pointer" title="Click to change research"></div>
    <button id="end-turn-btn" class="civ2-btn">End Turn</button>
    <div id="turn-waiting" style="display:none">Waiting for opponent...</div>
    <div id="advisors-menu-wrap">
      <button id="advisors-btn" class="civ2-btn" style="padding:2px 8px;font-size:12px">Advisors</button>
      <div id="advisors-popup" class="advisors-popup" style="display:none">
        <button class="advisors-item" data-advisor="civilopedia">Civilopedia (F1)</button>
        <button class="advisors-item" data-advisor="military">Military Advisor (F2)</button>
        <button class="advisors-item" data-advisor="trade">Trade Advisor (F3)</button>
        <button class="advisors-item" data-advisor="city">City Advisor (F4)</button>
        <button class="advisors-item" data-advisor="science">Science Advisor (F5)</button>
        <button class="advisors-item" data-advisor="demographics">Demographics (F11)</button>
        <button class="advisors-item" data-advisor="techtree">Tech Tree</button>
        <button class="advisors-item" data-advisor="taxrates">Tax Rates</button>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Global overlays                                                -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- Chat / Event Log Panel (Trevdor-style) -->
<div id="chatPanel" class="hidden">
  <div id="chatToastStack" class="chatToastStack"></div>
  <div id="chatBox" class="chatBox hidden">
    <div class="chatHeader">
      <label class="gameLogToggleLabel">
        <input type="checkbox" id="chatPinToggle">
        Pin
      </label>
      <label class="gameLogToggleLabel">
        <input type="checkbox" id="gameLogToggle" checked>
        Game updates
      </label>
      <label class="gameLogToggleLabel">
        <input type="checkbox" id="debugLogToggle">
        Debug
      </label>
    </div>
    <div id="chatMessages" class="chatMessages"></div>
    <div class="chatInputRow">
      <input id="chatInput" class="chatInput" type="text"
             placeholder="Type a message…" maxlength="200" autocomplete="off">
      <button id="chatSendBtn" class="chatSendBtn">Send</button>
    </div>
  </div>
  <button id="chatToggleBtn" class="chatToggleBtn">
    &#x1F4AC;
    <span id="chatBadge" class="chatBadge hidden">0</span>
  </button>
</div>

<div id="unit-menu"></div>
<div id="tooltip"></div>
<div id="loading-overlay"><div class="spinner"></div><div class="msg" id="loading-msg">Rendering...</div></div>
<div id="cityview-overlay">
  <div id="cityview-backdrop"></div>
  <div id="cityview-container">
    <canvas id="cityview-canvas" width="1280" height="480"></canvas>
    <button id="cityview-close">&#x2715;</button>
  </div>
</div>
<div id="citydialog-overlay">
  <div id="citydialog-backdrop"></div>
  <canvas id="citydialog-canvas" width="656" height="466" style="display:none"></canvas>
  <canvas id="citydialog-viewport"></canvas>
  <button id="citydialog-close">&#x2715;</button>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
