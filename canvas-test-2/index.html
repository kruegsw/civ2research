<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Civ2 Save Viewer — canvas-test-2</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="controls">
  <label class="file-btn" id="sav-btn">
    Load .SAV <input type="file" id="sav-input" accept=".sav,.SAV,.net,.NET,.scn,.SCN">
  </label>
  <label class="file-btn" id="t1-btn">
    TERRAIN1.GIF <input type="file" id="t1-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="t2-btn">
    TERRAIN2.GIF <input type="file" id="t2-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="cities-btn">
    CITIES.GIF <input type="file" id="cities-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="units-btn">
    UNITS.GIF <input type="file" id="units-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="icons-btn">
    ICONS.GIF <input type="file" id="icons-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="people-btn">
    PEOPLE.GIF <input type="file" id="people-input" accept=".gif,.GIF">
  </label>
  <label class="file-btn" id="city-btn">
    CITY.GIF <input type="file" id="city-input" accept=".gif,.GIF">
  </label>
  <button id="render-btn" disabled>Render Map</button>
  <label style="display:flex;align-items:center;gap:4px">
    <input type="checkbox" id="grid-toggle"> Grid
  </label>
  <label style="display:flex;align-items:center;gap:4px">
    <input type="checkbox" id="fow-toggle"> Fog of War
  </label>
  <select id="fow-civ" style="background:#0f3460;color:#e0e0e0;border:1px solid #1a5276;padding:4px 8px;border-radius:4px;font-size:13px" disabled>
    <option value="">— select civ —</option>
  </select>
  <span id="status">Load a .SAV file and both TERRAIN GIFs to begin.</span>
</div>

<div id="map-container">
  <canvas id="map-canvas"></canvas>
  <canvas id="viewport-canvas"></canvas>
</div>

<div id="tooltip"></div>
<div id="loading-overlay"><div class="spinner"></div><div class="msg" id="loading-msg">Rendering...</div></div>
<div id="cityview-overlay">
  <div id="cityview-backdrop"></div>
  <div id="cityview-container">
    <canvas id="cityview-canvas" width="1280" height="480"></canvas>
    <button id="cityview-close">&#x2715;</button>
  </div>
</div>
<div id="citydialog-overlay">
  <div id="citydialog-backdrop"></div>
  <div id="citydialog-container">
    <canvas id="citydialog-canvas" width="656" height="466"></canvas>
    <button id="citydialog-close">&#x2715;</button>
  </div>
</div>

<script src="js/parser.js"></script>
<script src="js/renderer.js"></script>
<script src="js/cityview.js"></script>
<script src="js/citydialog.js"></script>
<script src="js/app.js"></script>
</body>
</html>
