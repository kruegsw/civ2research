<!DOCTYPE html>
<html>
<head>
<title>Civilization II — v4 Engine</title>
<style>
  body { margin: 0; background: #111; color: #ccc; font: 14px monospace; overflow: hidden; }
  #status { position: fixed; top: 0; left: 0; right: 0; padding: 6px 12px; background: rgba(0,0,0,0.8); z-index: 10; }
  canvas { display: block; margin: 0 auto; image-rendering: pixelated; }
</style>
</head>
<body>
<div id="status">Loading v4 engine...</div>
<canvas id="display" width="1024" height="768"></canvas>

<script type="module">
import { setMainCanvas } from './gdi.js';
import './globals-init.js';
import './symbols.js';  // PTR_ and s_ symbol offsets (pre-generated for browser)
import { v, wv, w16, w32, s16, s32, u8, ptrAdd, _MEM, loopReset } from './mem.js';
import { loadRules, initBinaryConstants } from './rules-loader.js';
import { loadSav } from './sav-loader.js';
import { loadAllSprites } from './sprite-loader.js';

const canvas = document.getElementById('display');
const status = document.getElementById('status');
setMainCanvas(canvas);
status.textContent = 'GDI layer connected. Loading engine...';

// Initialize engine
initBinaryConstants();
status.textContent = 'Loading RULES.TXT...';

// Fetch RULES.TXT and a save file
async function boot() {
  try {
    const rulesResp = await fetch('/assets/RULES.TXT');
    if (!rulesResp.ok) throw new Error('RULES.TXT not found at /assets/RULES.TXT');
    const rulesText = await rulesResp.text();
    loadRules(rulesText);
    status.textContent = 'Rules loaded. Loading save file...';

    const savResp = await fetch('/assets/game.sav');
    if (!savResp.ok) throw new Error('game.sav not found at /assets/game.sav');
    const savBuf = new Uint8Array(await savResp.arrayBuffer());
    loadSav(savBuf);
    _MEM[DAT_00655b0b] = 0; // headless: all AI

    const turn = s16(DAT_00655af8, 0);
    const units = s16(DAT_00655b16, 0);
    const cities = s16(DAT_00655b18, 0);
    status.textContent = `Loaded: turn ${turn}, ${units} units, ${cities} cities. Loading sprites...`;

    // Load sprite sheets into MSBitmap structs
    const sprites = await loadAllSprites('/assets');
    status.textContent += ' Sprites loaded. Running...';

    // Raise loop guard limit for browser — rendering calls accumulate many
    // message pump iterations that are harmless (each exits after 1 iteration
    // thanks to gdi_BA4F clearing the flag)
    const memModule = await import('./mem.js');
    memModule.setLoopLimit(5000000); // 5M for browser (headless uses 500K)

    // Import turn pipeline
    const { FUN_00489553 } = await import('./blocks/block_00480000.js');

    const alive = _MEM[DAT_00655b0a];
    for (let civ = 1; civ < 8; civ++) {
      if (!(alive & (1 << civ))) continue;
      _MEM[DAT_00655b05] = civ;
      wv(DAT_006d1da0, civ);
      loopReset(); // reset loop guard counters between civs
      // Clear MFC rendering flags before each civ to prevent loop accumulation
      globalThis.in_ECX[0x8c] = 0; globalThis.in_ECX[0x8d] = 0;
      globalThis.in_ECX[0x8e] = 0; globalThis.in_ECX[0x8f] = 0;
      globalThis.in_ECX[0x3d] |= 4;
      try {
        FUN_00489553(civ);
      } catch(e) {
        console.warn('Civ ' + civ + ':', e.message);
      }
    }
    wv(DAT_00655af8, s16(DAT_00655af8, 0) + 1);

    const t2 = s16(DAT_00655af8, 0);
    const u2 = s16(DAT_00655b16, 0);
    const c2 = s16(DAT_00655b18, 0);
    status.textContent = `Turn ${t2}: ${u2} units, ${c2} cities. Binary rendering active.`;

  } catch(e) {
    status.textContent = 'Error: ' + e.message;
    console.error(e);
  }
}

boot();
</script>
</body>
</html>
